name: Clone AndroidTV-x86 Source

on:
  workflow_dispatch: # Chạy thủ công khi bạn muốn đồng bộ mã nguồn mới nhất

jobs:
  clone-source:
    runs-on: ubuntu-latest
    steps:
    - name: Free Disk Space (Dọn dẹp ổ cứng GitHub Actions)
      uses: jlumbroso/free-disk-space@v1.3.1
      with:
        tool-cache: true
        android: false # Giữ lại các công cụ Android cần thiết

    - name: Install Repo Tool
      run: |
        mkdir -p ~/bin
        curl https://googleapis.com > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Configure Git
      run: |
        git config --global user.name "Your Name"
        git config --global user.email "you@example.com"

    - name: Initialize and Sync AndroidTV-x86 Repo
      run: |
        mkdir android-x86
        cd android-x86
        # Khởi tạo repo Android-x86 (Ví dụ bản Android 9 hoặc bản bạn đang dùng)
        repo init -u https://osdn.net -b maroon-x86
        
        echo "📥 Đang tải mã nguồn (Quá trình này tốn nhiều thời gian)..."
        # --depth=1 để tải bản mới nhất, nhẹ ổ cứng
        repo sync -c -j$(nproc) --no-tags --depth=1 

    # Lưu mã nguồn vào Cache hoặc Server riêng của bạn để workflow build dùng tiếp
    - name: Cache Source Code
      uses: actions/cache@v4
      with:
        path: android-x86
        key: android-tv-src-${{ github.sha }}
